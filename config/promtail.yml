server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn

positions:
  filename: /tmp/positions/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    batchsize: 1048576
    batchwait: 1s

scrape_configs:
  # Docker container logs (JSON file driver)
  - job_name: docker_containers
    static_configs:
      - targets: [localhost]
        labels:
          job: docker
          __path__: /var/lib/docker/containers/*/*-json.log
    pipeline_stages:
      - json:
          expressions:
            output: log
            stream: stream
            time: time
            attrs: attrs
      - json:
          source: attrs
          expressions:
            tag:
      - regex:
          source: tag
          expression: '^(?P<container_name>[^/]+)/(?P<image_name>[^:]+)'
      - labels:
          stream:
          container_name:
          image_name:
      - timestamp:
          source: time
          format: RFC3339Nano
      - output:
          source: output
      - drop:
          expression: '^\s*$'

  # PM2 process logs
  - job_name: pm2_logs
    static_configs:
      - targets: [localhost]
        labels:
          job: pm2
          __path__: /pm2logs/*.log
    pipeline_stages:
      - regex:
          source: filename
          expression: '/pm2logs/(?P<process_name>[^-]+)(?:-(?:out|error))?\.log$'
      - labels:
          process_name:
      - drop:
          expression: '^\s*$'
